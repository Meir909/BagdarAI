services:
  - type: web
    name: bagdarai
    env: node
    buildCommand: npm run build && npx prisma migrate deploy && npm run db:seed || true
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: DATABASE_URL
        sync: false

  - type: web
    name: bagdarai-studio
    env: docker
    dockerfilePath: ./prisma/Dockerfile
    envVars:
      - key: DATABASE_URL
        sync: false
